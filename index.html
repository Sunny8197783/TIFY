<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 음악 추천기 - 유튜브 연동</title>
    <style>
        /* 로딩 애니메이션 원(Circle) 스타일 */
        .loader {
            display: none; /* 기본적으로는 숨김 */
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1DB954; /* 윗부분만 초록색 */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite; /* 무한 휠 회전 애니메이션 */
        }
        
        /* 로딩 원이 360도 도는 효과 정의 */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* (참고) 이전 답변에 있던 전체 CSS 스타일들이 이곳에 위치해야 화면이 예쁘게 나옵니다. */
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 AI 음악 추천기</h1>
    <p>지금 기분이나 원하는 분위기를 입력하세요!</p>
    
    <input type="text" id="userInput" placeholder="예: 비 오는 날 카페에서 듣기 좋은 재즈">
    <button onclick="getMusicRecommendation()">추천 받기</button>
    
    <div class="loader" id="loader"></div>
    <div class="result-box" id="resultBox"></div>
</div>

<!-- ========================================================
     ★ 핵심 수정 포인트: 외부 자바스크립트 파일 연결하기
     index.html과 같은 폴더에 있는 script.js 파일을 로드합니다.
     ======================================================== -->
<script src="script.js"></script>

</body>
</html>

<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>감정 기록</title>
<link rel="stylesheet" href="css/style.css"/>
</head><body>
<div class="app">
  
<aside class="sidebar">
  <a href="index.html" class="nav-item"><span class="ico">🏠</span><span>홈</span></a>
<a href="result.html" class="nav-item"><span class="ico">🎵</span><span>추천 플레이리스트</span></a>
<a href="record.html" class="nav-item active"><span class="ico">💗</span><span>감정 기록</span></a>
<a href="saved.html" class="nav-item"><span class="ico">🔖</span><span>저장한 음악</span></a>
<a href="#" class="nav-item"><span class="ico">⚙️</span><span>설정</span></a>

  <div class="quote">
    <span class="moon">🌙</span>
    "음악은 감정을<br/>이해하는 가장<br/>가까운 언어야."
  </div>
</aside>

  <main class="main">
    <section class="record">
      <h2>감정 기록</h2>
      <div class="record-grid">
        <div class="calendar-card">
          <div class="cal-head">
            <div class="cal-month" id="calMonth">5월 ▾</div>
            <div class="cal-nav">
              <button id="prevMonth">‹</button>
              <button id="nextMonth">›</button>
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>

        <div class="record-detail" id="recordDetail">
          <div class="rd-head">
            <div class="date">5월 20일 월요일</div>
            <div class="time">오후 11:42</div>
          </div>
          <div class="rd-mood">😔 지친 하루의 끝에서</div>
          <div class="rd-tags">
            <span class="rd-tag">#피로감</span>
            <span class="rd-tag">#외로움</span>
            <span class="rd-tag">#안정필요</span>
          </div>
          <div class="rd-text">오늘은 그냥 조용히 있고 싶었어.<br/>이 노래들이 날 위로해줬어.</div>
          <div class="rd-songs">
            <div class="rd-song-thumb"></div>
            <div class="rd-song-thumb"></div>
            <div class="rd-song-thumb"></div>
            <div class="rd-song-thumb"></div>
            <button class="rd-play-all">▶</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="js/record.js"></script>
</body></html>

<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>this is for you · 홈</title>
<link rel="stylesheet" href="css/style.css"/>
</head><body>
<div class="app">
  
<aside class="sidebar">
  <a href="index.html" class="nav-item active"><span class="ico">🏠</span><span>홈</span></a>
<a href="result.html" class="nav-item"><span class="ico">🎵</span><span>추천 플레이리스트</span></a>
<a href="record.html" class="nav-item"><span class="ico">💗</span><span>감정 기록</span></a>
<a href="saved.html" class="nav-item"><span class="ico">🔖</span><span>저장한 음악</span></a>
<a href="#" class="nav-item"><span class="ico">⚙️</span><span>설정</span></a>

  <div class="quote">
    <span class="moon">🌙</span>
    "음악은 감정을<br/>이해하는 가장<br/>가까운 언어야."
  </div>
</aside>

  <main class="main">
    <section class="home">
      <h1>오늘, 어떤 기분인가요?</h1>
      <p class="subtitle">당신의 감정을 이해하고, 그에 어울리는 음악을 추천해드릴게요.</p>

      <form class="input-wrap" id="inputForm">
        <input id="moodInput" type="text" placeholder="지금 느끼는 기분을 자유롭게 적어보세요..." autocomplete="off"/>
        <button class="send-btn" type="submit" aria-label="전송">➤</button>
      </form>

      <p class="or-text">또는 감정을 선택해보세요</p>
      <div class="chips" id="chips">
        <button class="chip" data-mood="happy" data-label="행복해"><span class="emoji">😊</span>행복해</button>
        <button class="chip" data-mood="sad"   data-label="우울해"><span class="emoji">😢</span>우울해</button>
        <button class="chip" data-mood="dawn"  data-label="새벽감성"><span class="emoji">🌙</span>새벽감성</button>
        <button class="chip" data-mood="focus" data-label="집중하고 싶어"><span class="emoji">🎧</span>집중하고 싶어</button>
        <button class="chip" data-mood="chill" data-label="멍 때리고 싶어"><span class="emoji">☁️</span>멍 때리고 싶어</button>
        <button class="chip" data-mood="love"  data-label="설레는 기분"><span class="emoji">💗</span>설레는 기분</button>
      </div>
    </section>
  </main>
</div>
<script src="js/chat.js"></script>
</body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 음악 추천기 - 유튜브 연동</title>
    <style>
        /* 1. 기본 레이아웃 및 폰트 스타일 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* 2. 입력창 및 검색 버튼 스타일 */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            border-color: #1DB954;
        }

        button.search-btn {
            width: 100%;
            padding: 12px;
            background-color: #1DB954; /* 스포티파이 감성 초록색 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button.search-btn:hover {
            background-color: #1aa34a;
        }

        /* 3. 🔄 [원본 유지] 로딩 애니메이션 원(Circle) 스타일 */
        .loader {
            display: none; /* 기본값 숨김, 자바스크립트가 작동할 때 켜짐 */
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1DB954; /* 윗부분만 초록색 */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite; /* 무한 회전 효과 */
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* 4. AI가 그려낼 음악 추천 카드 스타일 */
        .result-box {
            display: none;
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
            text-align: left; /* 카드 내용 정렬 */
        }

        .music-item {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .music-item strong {
            display: block;
            font-size: 16px;
            color: #212529;
            margin-bottom: 10px;
        }

        .music-item p {
            font-size: 14px;
            color: #6c757d;
            margin: 10px 0 0 0;
            line-height: 1.4;
        }

        /* 5. 동적 생성 버튼 스타일 (유튜브 검색, 공유하기) */
        .youtube-btn, .share-btn {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            margin-right: 5px;
            border: none;
            width: auto;
        }

        .youtube-btn {
            background-color: #ff0000;
            color: white;
        }

        .share-btn {
            background-color: #e1e7ec;
            color: #333;
            border: 1px solid #ccc;
        }
        
        .share-btn:hover {
            background-color: #d4dadf;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 AI 음악 추천기</h1>
    <p>지금 기분이나 원하는 분위기를 입력하세요!</p>
    
    <input type="text" id="userInput" placeholder="예: 비 오는 날 카페에서 듣기 좋은 재즈">
    <button class="search-btn" onclick="getMusicRecommendation()">추천 받기</button>
    
    <div class="loader" id="loader"></div>
    <div class="result-box" id="resultBox"></div>
</div>

<script src="script.js"></script>

</body>
</html>

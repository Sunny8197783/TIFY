<!doctype html><html lang="ko"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TIFY · 감정 기록</title><link rel="stylesheet" href="css/style.css"/>
</head><body>
<div class="app">
  
<aside class="sidebar">
  <div class="logo">TIFY</div>
  <a href="index.html" class="nav-item"><span class="ico">🏠</span><span>홈</span></a>
<a href="result.html" class="nav-item"><span class="ico">🎵</span><span>추천 플레이리스트</span></a>
<a href="record.html" class="nav-item active"><span class="ico">💗</span><span>감정 기록</span></a>
<a href="saved.html" class="nav-item"><span class="ico">🔖</span><span>저장한 음악</span></a>

  <div class="weather-card" id="weatherCard">
    <div class="wh"><span class="icon" id="wIcon">🌤</span><span class="temp" id="wTemp">--°</span></div>
    <div class="desc" id="wDesc">날씨 불러오는 중...</div>
    <div class="loc" id="wLoc">📍 위치 확인 중</div>
  </div>
  <div class="quote">
    <span class="moon">🌙</span>
    "음악은 감정을<br/>이해하는 가장<br/>가까운 언어야."
  </div>
</aside>

  <main class="main">
    <section class="page">
      <h2 style="text-align:left;margin-bottom:22px;">감정 기록</h2>
      <div class="record-layout">
        <div>
          <div class="calendar-card">
            <div class="cal-head">
              <div class="cal-month" id="calMonth">5월</div>
              <div class="cal-nav">
                <button id="prevMonth">‹</button>
                <button id="nextMonth">›</button>
              </div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </div>
          <div class="stats-card">
            <h3>이번 달 감정 통계</h3>
            <div class="stats-row" id="statsRow"><span style="color:var(--text-dim);font-size:13px;">아직 기록이 없어요.</span></div>
          </div>
        </div>
        <div class="record-detail" id="recordDetail">
          <p style="color:var(--text-dim);text-align:center;padding:40px 0;">날짜를 선택하면 그날의 감정 기록이 표시돼요.</p>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="js/weather.js"></script>
<script src="js/record.js"></script>
</body></html>

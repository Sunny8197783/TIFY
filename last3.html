      <!-- 감정 이모티콘 선택 공간 -->

<!-- 감정 기록 모달 -->
<div id="emotionModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-[#1C1D2E] p-6 rounded-2xl w-[400px]">
    <h3 class="text-xl font-semibold mb-4">오늘의 감정 기록 📝</h3>
    <textarea id="emotionText" rows="4" placeholder="오늘의 기분을 적어보세요..."
              class="w-full bg-white/10 text-white p-3 rounded-xl outline-none resize-none"></textarea>
    <div class="flex justify-end mt-4 gap-3">
      <button onclick="closeModal()" class="px-4 py-2 rounded-xl bg-gray-600 hover:bg-gray-500">취소</button>
      <button onclick="saveEmotion()" class="px-4 py-2 rounded-xl bg-indigo-500 hover:bg-indigo-400">저장</button>
    </div>
  </div>
</div>

<script>
function playSong(title) {
  alert(`🎵 '${title}' 재생 중입니다.`);
}
function saveSong(title) {
  alert(`❤️ '${title}'를 저장했습니다.`);
}
function openEmotionModal(date) {
  document.getElementById('emotionModal').classList.remove('hidden');
  document.getElementById('emotionModal').setAttribute('data-date', date);
}
function closeModal() {
  document.getElementById('emotionModal').classList.add('hidden');
}
function saveEmotion() {
  const date = document.getElementById('emotionModal').getAttribute('data-date');
  const text = document.getElementById('emotionText').value;
  alert(`📝 ${date} 감정 기록 저장됨: ${text}`);
  document.getElementById('emotionText').value = "";
  closeModal();
}
function setMood(mood) {
  const body = document.getElementById('pageBody');
  switch(mood) {
    case 'happy':
      body.style.background = 'linear-gradient(270deg, #FBC02D, #F9A825)';
      break;
    case 'sad':
      body.style.background = 'linear-gradient(270deg, #6A5ACD, #8A2BE2)';
      break;
    case 'calm':
      body.style.background = 'linear-gradient(270deg, #81C784, #A5D6A7)';
      break;
    case 'excited':
      body.style.background = 'linear-gradient(270deg, #FF80AB, #FF4081)';
      break;
    case 'romantic':
      body.style.background = 'linear-gradient(270deg, #F48FB1, #CE93D8)';
      break;
    case 'lonely':
      body.style.background = 'linear-gradient(270deg, #4FC3F7, #0288D1)';
      break;
  }
  body.classList.add('mood-bg');
}
</script>
